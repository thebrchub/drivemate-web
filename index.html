<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>driveweb.brchub.tech</title>
    <meta name="title" content="DriveMate | Your Digital Garage, Perfected." />
    <meta name="description" content="Track service, manage renewals, get smart reminders and keep every vehicle detail in one place." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://driveweb.brchub.tech/" />
    <meta property="og:title" content="DriveMate | Your Digital Garage, Perfected." />
    <meta property="og:description" content="Track service, manage renewals, get smart reminders and keep every vehicle detail in one place." />
    <!-- 
      Since it is in the public folder, we can just reference it from the root. 
      Update 'og-image.png' if your file has a different name! 
    -->
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://driveweb.brchub.tech/" />
    <meta property="twitter:title" content="DriveMate | Your Digital Garage, Perfected." />
    <meta property="twitter:description" content="Track service, manage renewals, get smart reminders and keep every vehicle detail in one place." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- ANTI-FOUC SCRIPT: Forces Dark Mode as the default immediately -->
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
        if (!localStorage.getItem('theme')) {
          localStorage.setItem('theme', 'dark');
        }
      }
    </script>

    <!-- Fonts: Outfit (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
